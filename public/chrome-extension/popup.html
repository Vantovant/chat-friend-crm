<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vanto CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: hsl(222, 47%, 6%);
      color: hsl(210, 40%, 98%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }
    .popup-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid hsl(217, 33%, 17%);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-logo { font-size: 22px; }
    .popup-title { font-weight: 700; font-size: 14px; color: hsl(172, 66%, 50%); }
    .popup-subtitle { font-size: 10px; color: hsl(215, 20%, 55%); margin-top: 1px; }

    .popup-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    /* Login view is VISIBLE by default — JS hides it only if already logged in */
    #view-loggedin { display: none; flex-direction: column; gap: 10px; }
    #view-login    { display: flex; flex-direction: column; gap: 10px; }

    .user-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: hsl(172, 66%, 8%);
      border: 1px solid hsl(172, 66%, 20%);
      border-radius: 8px;
      font-size: 12px;
      color: hsl(172, 66%, 60%);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: hsl(172, 66%, 50%); flex-shrink: 0;
    }
    .user-email { font-size: 11px; color: hsl(210,40%,70%); word-break: break-all; }

    .form-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
      color: hsl(215, 20%, 55%); text-transform: uppercase; margin-bottom: 3px;
    }
    .form-input {
      width: 100%; padding: 8px 10px;
      background: hsl(217, 33%, 11%);
      border: 1px solid hsl(217, 33%, 22%);
      border-radius: 7px;
      color: hsl(210, 40%, 98%);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: hsl(172, 66%, 40%); }

    .error-msg {
      font-size: 11px; color: hsl(0, 72%, 65%);
      padding: 7px 10px;
      background: hsl(0, 50%, 10%);
      border: 1px solid hsl(0, 60%, 25%);
      border-radius: 7px;
      display: none;
    }
    .error-msg.show { display: block; }

    .popup-btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      background: hsl(172, 66%, 50%);
      color: hsl(222, 47%, 6%);
      transition: background 0.15s;
    }
    .popup-btn:hover { background: hsl(172, 66%, 42%); }
    .popup-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .popup-btn-outline {
      background: transparent;
      color: hsl(210, 40%, 98%);
      border: 1px solid hsl(217, 33%, 25%);
    }
    .popup-btn-outline:hover { background: hsl(217, 33%, 14%); }
    .popup-btn-danger {
      background: transparent;
      color: hsl(0, 72%, 65%);
      border: 1px solid hsl(0, 50%, 28%);
      font-size: 11px;
      padding: 7px 14px;
    }
    .popup-btn-danger:hover { background: hsl(0, 50%, 10%); }

    .popup-footer {
      padding: 10px 16px;
      border-top: 1px solid hsl(217, 33%, 17%);
      font-size: 10px; color: hsl(215, 20%, 40%); text-align: center;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-logo">⚡</span>
    <div>
      <p class="popup-title">Vanto CRM</p>
      <p class="popup-subtitle">WhatsApp Web Extension</p>
    </div>
  </div>

  <div class="popup-body">

    <!-- Logged-in view (hidden by default) -->
    <div id="view-loggedin">
      <div class="user-badge">
        <span class="status-dot"></span>
        <span>Logged in</span>
      </div>
      <p class="user-email" id="display-email">—</p>
      <a class="popup-btn" href="https://web.whatsapp.com" target="_blank">Open WhatsApp Web</a>
      <a class="popup-btn popup-btn-outline" href="https://chat-friend-crm.lovable.app" target="_blank">Open Dashboard</a>
      <button class="popup-btn popup-btn-danger" id="btn-logout">Log out</button>
    </div>

    <!-- Login view (visible by default) -->
    <div id="view-login">
      <p style="font-size:12px;color:hsl(215,20%,60%);">Log in to save contacts to Vanto CRM.</p>

      <div>
        <p class="form-label">Email</p>
        <input class="form-input" type="email" id="input-email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div>
        <p class="form-label">Password</p>
        <input class="form-input" type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="error-msg" id="login-error"></div>

      <button class="popup-btn" id="btn-login">Log in</button>
      <a class="popup-btn popup-btn-outline" href="https://chat-friend-crm.lovable.app" target="_blank">Open Dashboard</a>
    </div>

  </div>

  <div class="popup-footer">Vanto CRM v1.2.0</div>

  <script>
    var SUPABASE_URL      = 'https://nqyyvqcmcyggvlcswkio.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xeXl2cWNtY3lnZ3ZsY3N3a2lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NDYxMjYsImV4cCI6MjA4NzEyMjEyNn0.oK04GkXogHo9pohYd4A7XAV0-Q-qSu-uUiGWaj4ClM8';

    var viewLogin    = document.getElementById('view-login');
    var viewLoggedin = document.getElementById('view-loggedin');
    var emailInput   = document.getElementById('input-email');
    var passInput    = document.getElementById('input-password');
    var loginBtn     = document.getElementById('btn-login');
    var logoutBtn    = document.getElementById('btn-logout');
    var errorEl      = document.getElementById('login-error');
    var displayEmail = document.getElementById('display-email');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function clearError() {
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    }
    function resetLoginBtn() {
      loginBtn.disabled    = false;
      loginBtn.textContent = 'Log in';
    }
    function showLoggedIn(email) {
      viewLogin.style.display    = 'none';
      viewLoggedin.style.display = 'flex';
      displayEmail.textContent   = email || '—';
    }
    function showLoginView() {
      viewLoggedin.style.display = 'none';
      viewLogin.style.display    = 'flex';
      resetLoginBtn();
    }

    // ── On load: check for stored session ────────────────────────────────
    chrome.storage.local.get(['vanto_token', 'vanto_email'], function(result) {
      console.log('[Vanto Popup] Storage check:', result.vanto_token ? 'token found' : 'no token');
      if (result.vanto_token) {
        showLoggedIn(result.vanto_email || '');
      }
      // If no token, login view is already visible — do nothing
    });

    // ── Login handler ─────────────────────────────────────────────────────
    function doLogin() {
      console.log('[Vanto Popup] Login clicked');
      clearError();

      var email    = (emailInput.value || '').trim();
      var password = passInput.value || '';

      if (!email || !password) {
        showError('Please enter email and password.');
        return;
      }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'Logging in…';

      var controller = new AbortController();
      var timeout    = setTimeout(function() { controller.abort(); }, 12000);

      fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method:  'POST',
        signal:  controller.signal,
        headers: {
          'apikey':        SUPABASE_ANON_KEY,
          'Content-Type':  'application/json'
        },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(function(res) {
        clearTimeout(timeout);
        return res.json().then(function(data) {
          return { ok: res.ok, data: data };
        });
      })
      .then(function(r) {
        if (!r.ok || !r.data.access_token) {
          var msg = (r.data && (r.data.error_description || r.data.msg)) || 'Login failed. Check credentials.';
          console.log('[Vanto Popup] Login failed:', msg);
          showError(msg);
          resetLoginBtn();
          return;
        }

        var token    = r.data.access_token;
        var userEmail = (r.data.user && r.data.user.email) || email;

        console.log('[Vanto Popup] Login success:', userEmail);

        // Store token under key "vanto_token"
        chrome.storage.local.set({
          vanto_token: token,
          vanto_email: userEmail
        }, function() {
          // Notify any open WhatsApp tabs
          try {
            chrome.tabs.query({ url: 'https://web.whatsapp.com/*' }, function(tabs) {
              if (tabs && tabs.length) {
                tabs.forEach(function(tab) {
                  chrome.tabs.sendMessage(tab.id, { type: 'VANTO_TOKEN_UPDATED' }, function() {
                    void chrome.runtime.lastError;
                  });
                });
              }
            });
          } catch(e) {}

          showLoggedIn(userEmail);
        });
      })
      .catch(function(err) {
        clearTimeout(timeout);
        var msg = err.name === 'AbortError'
          ? 'Request timed out — check your connection.'
          : 'Network error — check your connection.';
        console.log('[Vanto Popup] Login error:', err.message);
        showError(msg);
        resetLoginBtn();
      });
    }

    // ── Event listeners ───────────────────────────────────────────────────
    loginBtn.addEventListener('click', function(e) {
      e.preventDefault();
      doLogin();
    });

    emailInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    passInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    logoutBtn.addEventListener('click', function() {
      chrome.storage.local.remove(['vanto_token', 'vanto_email'], function() {
        passInput.value = '';
        showLoginView();
      });
    });
  </script>
</body>
</html>
