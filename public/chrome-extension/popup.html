<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanto CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      background: hsl(222, 47%, 6%);
      color: hsl(210, 40%, 98%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }
    .popup-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid hsl(217, 33%, 17%);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-logo {
      font-size: 22px;
    }
    .popup-title {
      font-weight: 700;
      font-size: 14px;
      color: hsl(172, 66%, 50%);
    }
    .popup-subtitle {
      font-size: 10px;
      color: hsl(215, 20%, 55%);
      margin-top: 1px;
    }
    .popup-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .popup-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: hsl(172, 66%, 8%);
      border: 1px solid hsl(172, 66%, 20%);
      border-radius: 8px;
      font-size: 12px;
      color: hsl(172, 66%, 60%);
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: hsl(172, 66%, 50%);
      flex-shrink: 0;
    }
    .popup-btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      background: hsl(172, 66%, 50%);
      color: hsl(222, 47%, 6%);
      transition: background 0.15s;
    }
    .popup-btn:hover { background: hsl(172, 66%, 45%); }
    .popup-btn-outline {
      background: transparent;
      color: hsl(210, 40%, 98%);
      border: 1px solid hsl(217, 33%, 25%);
    }
    .popup-btn-outline:hover { background: hsl(217, 33%, 14%); }
    .popup-footer {
      padding: 10px 16px;
      border-top: 1px solid hsl(217, 33%, 17%);
      font-size: 10px;
      color: hsl(215, 20%, 40%);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-logo">⚡</span>
    <div>
      <p class="popup-title">Vanto CRM</p>
      <p class="popup-subtitle">WhatsApp Web Extension</p>
    </div>
  </div>
  <div class="popup-body">
    <div class="popup-status">
      <span class="status-dot"></span>
      Extension Active
    </div>
    <a class="popup-btn" href="https://web.whatsapp.com" target="_blank">
      Open WhatsApp Web
    </a>
    <a class="popup-btn popup-btn-outline" href="https://chat-friend-crm.lovable.app" target="_blank">
      Open Dashboard
    </a>
  </div>
  <div class="popup-footer">Vanto CRM v1.0.0</div>
</body>
</html>
